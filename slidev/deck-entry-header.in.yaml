theme: default
title: __DECK_TITLE__
favicon: /GAD_Logo.ico
author: xichen@soundoer.com

# Client router: history URLs (no `#`). See `routerMode` in Slidev docs if you need hash for static hosts without SPA fallback.
routerMode: history

contextMenu: dev
presenter: dev
record: dev
wakeLock: build
mdc: true

drawings:
  enabled: dev
  persist: false
  presenterOnly: false
  syncAll: true

transition: slide-left
fonts:
  sans: Noto Sans SC
  serif: Cormorant Garamond
  mono: Fira Code
colorSchema: dark
aspectRatio: 16/9
canvasWidth: 1080
