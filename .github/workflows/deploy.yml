name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/gad_deploy
          chmod 600 ~/.ssh/gad_deploy

      - name: Deploy to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/gad_deploy -o StrictHostKeyChecking=no" \
            build/ \
            gad-deploy@${{ secrets.VPS_HOST }}:/var/www/gad/
