name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Shallow clone: full history + vidTemp binaries made checkout exceed ~1h in practice.
          fetch-depth: 1

      # Default ubuntu-latest image leaves little free space; Slidev + large media fills the rest during Pages artifact pack.
      - name: Remove preinstalled SDKs to free disk
        run: |
          set -x
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af || true
          df -h

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test
      - name: Build website
        run: npm run build

      - name: List build directory contents
        run: ls -alh build

      # upload-pages-artifact archives `build/` (needs headroom ~ size of tree); drop deps and npm cache.
      - name: Free disk space before Pages artifact
        run: |
          npm cache clean --force || true
          rm -rf node_modules ~/.npm/_cacache
          du -sh build build/slides 2>/dev/null || du -sh build
          df -h

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
